<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interventions</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.12);
      --text: #1a1a18;
      --muted: #6b6b66;
      --accent: #185FA5;
      --accent-light: #E6F1FB;
      --success: #3B6D11;
      --success-light: #EAF3DE;
      --danger: #A32D2D;
      --danger-light: #FCEBEB;
      --radius: 10px;
      --radius-sm: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    header {
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    header h1 { font-size: 16px; font-weight: 500; }
    #status {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--accent-light);
      color: var(--accent);
      white-space: nowrap;
    }
    #status.ok    { background: var(--success-light); color: var(--success); }
    #status.error { background: var(--danger-light);  color: var(--danger); }

    main { padding: 1rem 1.25rem; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.25rem;
    }
    .stat {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
    }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
    .stat-value { font-size: 22px; font-weight: 500; }

    .section { margin-bottom: 1.5rem; }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
    }
    .section-header h2 { font-size: 14px; font-weight: 500; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      border: 0.5px solid var(--border);
      font-size: 13px;
    }
    thead { background: var(--bg); }
    th {
      text-align: left;
      padding: 8px 12px;
      font-weight: 500;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 0.5px solid var(--border);
    }
    td { padding: 8px 12px; border-bottom: 0.5px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }

    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 20px;
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 500;
    }
    .empty { text-align: center; padding: 1.5rem; color: var(--muted); font-size: 13px; }

    /* Formulaire ajout */
    .form-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      display: none;
    }
    .form-card.visible { display: block; }
    .form-card h3 { font-size: 13px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.75rem; }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .field { display: flex; flex-direction: column; gap: 3px; }
    .field label { font-size: 12px; color: var(--muted); }
    .field input, .field select {
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 9px;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      width: 100%;
    }
    .field input:focus, .field select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

    .form-actions { display: flex; gap: 0.5rem; }
    button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { opacity: 0.9; }
    button.secondary {
      background: var(--bg);
      color: var(--text);
      border: 0.5px solid var(--border);
    }
    .notif {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      margin-top: 0.5rem;
      display: none;
    }
    .notif.ok    { background: var(--success-light); color: var(--success); display: block; }
    .notif.error { background: var(--danger-light);  color: var(--danger);  display: block; }
  </style>
</head>
<body>

<header>
  <h1>Interventions — Tableau de bord</h1>
  <span id="status">Connexion Grist…</span>
</header>

<main>

  <div class="stats">
    <div class="stat"><div class="stat-label">Interventions</div><div class="stat-value" id="countInterv">—</div></div>
    <div class="stat"><div class="stat-label">Utilisateurs</div><div class="stat-value" id="countUsers">—</div></div>
    <div class="stat"><div class="stat-label">Services</div><div class="stat-value" id="countServices">—</div></div>
  </div>

  <div class="section">
    <div class="section-header">
      <h2>Interventions</h2>
      <button id="btn-add" onclick="toggleForm()">+ Ajouter</button>
    </div>

    <div class="form-card" id="form-add">
      <h3>Nouvelle intervention</h3>
      <div class="form-grid">
        <div class="field">
          <label for="f-date">Date</label>
          <input type="date" id="f-date" />
        </div>
        <div class="field">
          <label for="f-quoi">Description</label>
          <input type="text" id="f-quoi" placeholder="Décrivez l'intervention…" />
        </div>
        <div class="field">
          <label for="f-qui">Intervenant</label>
          <select id="f-qui"><option value="">— choisir —</option></select>
        </div>
      </div>
      <div class="form-actions">
        <button onclick="addIntervention()">Enregistrer</button>
        <button class="secondary" onclick="toggleForm()">Annuler</button>
      </div>
      <div class="notif" id="form-notif"></div>
    </div>

    <table>
      <thead><tr><th>Date</th><th>Quoi</th><th>Intervenant</th><th>Service</th></tr></thead>
      <tbody id="tbodyInterv"><tr><td colspan="4" class="empty">Chargement…</td></tr></tbody>
    </table>
  </div>

  <div class="section">
    <div class="section-header"><h2>Utilisateurs</h2></div>
    <table>
      <thead><tr><th>Nom</th><th>Prénom</th><th>Service</th><th>Adresse</th></tr></thead>
      <tbody id="tbodyUsers"><tr><td colspan="4" class="empty">Chargement…</td></tr></tbody>
    </table>
  </div>

</main>

<script>
let userMap   = {};    // id → fields
let userList  = [];    // liste complète pour le select
let allInterv = [];    // cache des interventions

function setStatus(msg, type = "") {
  const s = document.getElementById("status");
  s.textContent = msg;
  s.className = type;
}

function formatDate(val) {
  if (!val) return "—";
  const d = new Date(val * 1000);
  return isNaN(d) ? val : d.toLocaleDateString("fr-FR");
}

function toTimestamp(dateStr) {
  return dateStr ? Math.floor(new Date(dateStr + "T00:00:00Z").getTime() / 1000) : null;
}

// ── Rendu tableau Interventions ──────────────────────────────
function renderInterventions(records) {
  const tb = document.getElementById("tbodyInterv");
  if (!records.length) {
    tb.innerHTML = `<tr><td colspan="4" class="empty">Aucune intervention.</td></tr>`;
    return;
  }
  tb.innerHTML = records.map(r => {
    const f    = r.fields;
    const user = userMap[f.Qui] || {};
    const nom  = (user.Nom || user.Prenom)
      ? `${user.Prenom || ""} ${user.Nom || ""}`.trim()
      : (f.Qui ? `#${f.Qui}` : "—");
    const svc  = user.Services ? `<span class="badge">${user.Services}</span>` : "—";
    return `<tr>
      <td>${formatDate(f.Date)}</td>
      <td>${f.Quoi || "—"}</td>
      <td>${nom}</td>
      <td>${svc}</td>
    </tr>`;
  }).join("");
  document.getElementById("countInterv").textContent = records.length;
}

// ── Rendu tableau Utilisateurs ───────────────────────────────
function renderUsers(records) {
  const tb = document.getElementById("tbodyUsers");
  if (!records.length) {
    tb.innerHTML = `<tr><td colspan="4" class="empty">Aucun utilisateur.</td></tr>`;
    return;
  }
  tb.innerHTML = records.map(r => {
    const f = r.fields;
    return `<tr>
      <td>${f.Nom || "—"}</td>
      <td>${f.Prenom || "—"}</td>
      <td>${f.Services ? `<span class="badge">${f.Services}</span>` : "—"}</td>
      <td>${f.Adresse || "—"}</td>
    </tr>`;
  }).join("");

  // Mettre à jour le select du formulaire
  const sel = document.getElementById("f-qui");
  const cur = sel.value;
  sel.innerHTML = '<option value="">— choisir —</option>';
  records.forEach(r => {
    const f     = r.fields;
    const label = `${f.Prenom || ""} ${f.Nom || ""}`.trim() || `#${r.id}`;
    sel.innerHTML += `<option value="${r.id}">${label}${f.Services ? " — " + f.Services : ""}</option>`;
  });
  sel.value = cur;

  // Statistiques
  const services = new Set(records.map(r => r.fields.Services).filter(Boolean));
  document.getElementById("countUsers").textContent    = records.length;
  document.getElementById("countServices").textContent = services.size;
}

// ── Formulaire ───────────────────────────────────────────────
function toggleForm() {
  const form = document.getElementById("form-add");
  const btn  = document.getElementById("btn-add");
  const open = form.classList.toggle("visible");
  btn.textContent = open ? "✕ Fermer" : "+ Ajouter";
  if (open) {
    document.getElementById("f-date").value  = new Date().toISOString().slice(0, 10);
    document.getElementById("f-quoi").value  = "";
    document.getElementById("f-qui").value   = "";
    document.getElementById("form-notif").className = "notif";
  }
}

async function addIntervention() {
  const dateStr = document.getElementById("f-date").value;
  const quoi    = document.getElementById("f-quoi").value.trim();
  const quiId   = parseInt(document.getElementById("f-qui").value, 10);
  const notif   = document.getElementById("form-notif");

  if (!dateStr || !quoi || !quiId) {
    notif.textContent = "Veuillez remplir tous les champs.";
    notif.className   = "notif error";
    return;
  }

  try {
    // Écriture via l'API Grist native — aucune clé API nécessaire
    await grist.docApi.applyUserActions([
      ["AddRecord", "Interventions", null, {
        Date: toTimestamp(dateStr),
        Quoi: quoi,
        Qui:  quiId
      }]
    ]);
    notif.textContent = "Intervention ajoutée.";
    notif.className   = "notif ok";
    setTimeout(toggleForm, 1200);
  } catch (e) {
    notif.textContent = "Erreur : " + e.message;
    notif.className   = "notif error";
  }
}

// ── Initialisation Grist ─────────────────────────────────────
grist.ready({
  requiredAccess: "full",
  columns: []         // pas de liaison de colonne nécessaire — on lit toutes les tables
});

// Écoute la table Interventions
grist.onRecords("Interventions", (records) => {
  allInterv = records;
  renderInterventions(records);
  setStatus(`${records.length} interventions`, "ok");
});

// Écoute la table Utilisateurs
grist.onRecords("Utilisateurs", (records) => {
  userMap = {};
  records.forEach(r => { userMap[r.id] = r.fields; });
  userList = records;
  renderUsers(records);
  // Re-rendre les interventions pour mettre à jour les noms
  if (allInterv.length) renderInterventions(allInterv);
});
</script>
</body>
</html>
